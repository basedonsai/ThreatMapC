<body>
<div id="pe-root">
<style>
#pe-root{all:initial;display:block;}
#pe-root *{box-sizing:border-box;}
#pe-root{
  --bg:#f4f5f6;--surface:#ffffff;--border:#dddddd;--text:#555555;--text-dark:#333333;--muted:#888888;--accent:#4a7eba;
  font-family:'Segoe UI',Arial,sans-serif;font-size:12px;
  background:var(--bg);width:100%;height:100vh;
  display:flex;flex-direction:column;overflow:hidden;color:var(--text);
}
.pe-header{display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:50px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;z-index:100;flex-wrap:wrap;gap:6px;}
.pe-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;flex-shrink:0;color:var(--text-dark);}
.pe-mode-badge{background:#e8edf2;border:1px solid #ccd4dc;border-radius:3px;padding:2px 9px;font-size:11px;color:#555;display:flex;align-items:center;gap:5px;line-height:1.6;}
.pe-mode-dot{width:6px;height:6px;border-radius:50%;background:#5a9a6a;}
.pe-main{flex:1;display:flex;overflow:hidden;position:relative;}
.pe-canvas-wrap{flex:1;overflow:hidden;position:relative;background:#e8eaec;}
#pe-container{width:100%;height:100%;}
.pe-sidebar{width:360px;min-width:360px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;transition:width 0.25s ease,min-width 0.25s ease,opacity 0.25s ease;position:relative;z-index:50;overflow:hidden;}
.pe-sidebar.pe-collapsed{width:0;min-width:0;opacity:0;pointer-events:none;}
.pe-sidebar-resize-handle{position:absolute;left:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:70;background:transparent;}
.pe-sidebar-resize-handle:hover{background:rgba(100,140,200,0.18);}
.pe-sidebar-header{padding:8px 12px;border-bottom:1px solid var(--border);background:#f0f1f2;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.pe-sidebar-title{font-size:11px;font-weight:600;color:#444;text-transform:uppercase;letter-spacing:0.5px;}
.pe-close-btn{background:transparent;border:none;color:#888;font-size:15px;cursor:pointer;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:2px;}
.pe-close-btn:hover{background:#ddd;color:#333;}
.pe-sidebar-content{flex:1;overflow-y:auto;padding:0;}
.pe-field{display:flex;align-items:baseline;padding:6px 12px;border-bottom:1px solid #eee;gap:8px;}
.pe-field:last-child{border-bottom:none;}
.pe-label{font-size:11px;color:#888;min-width:80px;flex-shrink:0;display:block;font-weight:400;}
.pe-value{font-size:12px;font-weight:600;color:#444;}
.pe-zone-preview{width:calc(100% - 24px);margin:6px 12px 10px;height:64px;border:1px solid #ddd;border-radius:3px;background:#f8f8f8;position:relative;overflow:hidden;}
.pe-zone-rect{position:absolute;border:2px solid;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;}
.pe-hint{font-size:11px;color:#888;padding:4px 14px;background:#f0f1f2;border-top:1px solid #ddd;text-align:left;flex-shrink:0;}
.pe-zoom-controls{position:absolute;bottom:12px;right:12px;display:flex;flex-direction:column;gap:2px;z-index:200;}
.pe-zoom-btn{background:#fff;border:1px solid #ccc;border-radius:2px;width:26px;height:26px;color:#555;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.pe-zoom-btn:hover{background:#e8eaec;border-color:#aaa;color:#333;}
.pe-sidebar-toggle{position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:12px;height:40px;background:#fff;border:1px solid #ddd;border-right:none;border-radius:3px 0 0 3px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:9px;z-index:60;}
.pe-sidebar-toggle:hover{background:#f0f1f2;color:#555;}
.pe-tooltip{
  position:fixed;
  background:#fff;
  border:1px solid #d0d4da;
  border-radius:4px;
  padding:8px 10px;            /* reduced */
  font-size:12px;              /* slightly smaller */
  font-family:'Segoe UI',Arial,sans-serif;
  color:#333;
  pointer-events:none;
  z-index:9998;
  box-shadow:0 2px 8px rgba(0,0,0,0.14);
  min-width:140px;
  max-width:180px;             /* reduced */
  line-height:1.35;            /* tighter */
  display:none;
  overflow:hidden;
}
.pe-tooltip-title{
  font-weight:700;
  font-size:12px;
  color:#222;
  margin-bottom:4px;
  padding-bottom:3px;
  border-bottom:1px solid #eee;
}
.pe-tooltip-row{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-top:2px;
}
.pe-tooltip-lbl{ color:#888; }
.pe-tooltip-val{ font-weight:600; color:#333; }
.pe-btn{background:#e8eaec;border:1px solid #c8cdd2;border-radius:3px;padding:4px 10px;font-size:12px;font-family:'Segoe UI',Arial,sans-serif;color:#444;cursor:pointer;white-space:nowrap;line-height:1.5;transition:background 0.1s;display:inline-flex;align-items:center;gap:5px;}
.pe-btn:hover{background:#d8dce0;border-color:#b8bec4;}
.pe-btn svg{flex-shrink:0;}
@media(max-width:600px){.pe-sidebar{position:absolute;right:0;top:0;bottom:0;z-index:200;}.pe-sidebar.pe-collapsed{width:0;min-width:0;}}
</style>

<div class="pe-header">
  <div class="pe-title">
    <span>Plot Plan</span>
    <div class="pe-mode-badge">
      <div class="pe-mode-dot"></div>
      <span>Viewer Mode</span>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <label for="pe-ram-select" style="font-size:11px;font-weight:600;color:var(--text-dark);">RAM Filter:</label>
    <select id="pe-ram-select" style="min-width:140px;padding:6px 8px;border-radius:4px;border:1px solid #c8cdd2;background:#fff;color:#222;font-weight:600;">
      <option value="Overall RAM">Overall RAM</option>
      <option value="HSSC RAM">HSSC RAM</option>
      <option value="Production RAM">Production RAM</option>
    </select>
    <select id="pe-plot-select" style="min-width:220px;padding:6px 8px;border-radius:4px;border:1px solid #c8cdd2;background:#fff;color:#222;">
      <option>Loading published plots...</option>
    </select>
    <button class="pe-btn" id="pe-toggle-sidebar">&#x25C0; Panel</button>
  </div>
</div>

<div class="pe-main">
  <div id="pe-empty-state" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:#e8eaec;pointer-events:none;">
    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#b0b8c4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:14px;"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m8 17 4 4 4-4"/></svg>
    <div style="font-size:14px;font-weight:600;color:#8a96a3;margin-bottom:6px;">No layout loaded</div>
    <div style="font-size:12px;color:#aab0b8;">Import a layout to begin</div>
  </div>
  <div class="pe-canvas-wrap">
    <div id="pe-container"></div>
    <div class="pe-zoom-controls">
      <button class="pe-zoom-btn" id="pe-zoom-in" title="Zoom In">+</button>
      <button class="pe-zoom-btn" id="pe-zoom-reset" title="Reset View" style="font-size:11px;">&#x25A3;</button>
      <button class="pe-zoom-btn" id="pe-zoom-out" title="Zoom Out">&#x2212;</button>
    </div>
  </div>
  <div class="pe-sidebar" id="pe-sidebar">
    <button class="pe-sidebar-toggle" id="pe-sidebar-toggle-inner">&#x25B6;</button>
    <div class="pe-sidebar-header">
      <div class="pe-sidebar-title">Zone Details</div>
      <button class="pe-close-btn" id="pe-close-sidebar">&#xD7;</button>
    </div>
    <div class="pe-sidebar-content" id="pe-sidebar-content">
      <div style="color:#888;font-size:12px;text-align:center;padding-top:40px;">Click a zone to view details</div>
    </div>
  </div>
</div>
<div class="pe-hint">Click zone to view details &middot; Drag to pan &middot; Scroll to zoom</div>
</div>
<div class="pe-tooltip" id="pe-tooltip"></div>

<script>
(function(){
'use strict';
const COLORS={
  green:{fill:'rgba(80,160,100,0.12)',stroke:'#5a9a6a',text:'#3a7a4a'},
  yellow:{fill:'rgba(200,150,50,0.12)',stroke:'#c8963c',text:'#8a6010'},
  red:{fill:'rgba(190,80,80,0.12)',stroke:'#b85858',text:'#8a3030'},
  neutral:{fill:'rgba(140,140,140,0.1)',stroke:'#aaaaaa',text:'#666666'}
};
function getLevel(s){if(s===null||s===undefined)return 'neutral';if(s>=70)return 'green';if(s>=40)return 'yellow';return 'red';}

function formatMTOScore(num) {
  return Number(num || 0).toLocaleString('en-US');
}

function parseMTOScoreString(val) {
  if (!val) return 0;
  const s = String(val).replace(/,/g, '').trim();
  const n = parseInt(s, 10);
  return isNaN(n) ? 0 : n;
}

function getSelectedRamInfo(threatUnitData, ramType) {
  if (!threatUnitData || !Array.isArray(threatUnitData.details)) {
    return {
      threats: threatUnitData ? (threatUnitData.threats || 0) : 0,
      score: threatUnitData ? (threatUnitData.score || 0) : 0
    };
  }
  
  let count = 0;
  let scoreSum = 0;
  
  threatUnitData.details.forEach(item => {
    count++;
    let scoreVal = 0;
    if (ramType === 'HSSC RAM') {
      scoreVal = parseMTOScoreString(item.hsscScore || item.HSSCScore || item.mtoScore || item.MTOScore);
    } else if (ramType === 'Production RAM') {
      scoreVal = parseMTOScoreString(item.productionScore || item.ProductionScore || item.mtoScore || item.MTOScore);
    } else {
      scoreVal = parseMTOScoreString(item.mtoScore || item.MTOScore);
    }
    scoreSum += scoreVal;
  });
  
  return { threats: count, score: scoreSum };
}

function getUnitLevel(threatUnitData, ramType) {
  if (!threatUnitData || !Array.isArray(threatUnitData.details) || threatUnitData.details.length === 0) {
    return 'neutral';
  }
  
  let highestRating = 'neutral';
  
  threatUnitData.details.forEach(item => {
    let ramCode = '';
    if (ramType === 'HSSC RAM') {
      ramCode = (item.hsscRAM || item.HSSCRAM || item.primaryRAM || item.PrimaryRAM || '').toUpperCase().trim();
    } else if (ramType === 'Production RAM') {
      ramCode = (item.productionRAM || item.ProductionRAM || item.primaryRAM || item.PrimaryRAM || '').toUpperCase().trim();
    } else {
      ramCode = (item.primaryRAM || item.PrimaryRAM || '').toUpperCase().trim();
    }
    
    if (['D5', 'D4', 'E5', 'E4', 'C5', 'C4', 'D3', 'E3'].includes(ramCode)) {
      highestRating = 'red';
    } else if (['B5', 'B4', 'C3', 'C2', 'D2', 'E2', 'A5', 'A4'].includes(ramCode)) {
      if (highestRating !== 'red') highestRating = 'yellow';
    } else if (ramCode && highestRating === 'neutral') {
      highestRating = 'green';
    }
  });
  
  return highestRating;
}

function getRamStyle(ram) {
  if (!ram) return { bg: '#e8eaec', text: '#333' };
  const r = ram.toUpperCase().trim();
  if (['D5', 'D4', 'E5', 'E4', 'C5', 'C4', 'D3', 'E3'].includes(r)) {
    return { bg: '#d50000', text: '#ffffff' }; // Red
  }
  if (['B5', 'B4', 'C3', 'C2', 'D2', 'E2', 'A5', 'A4'].includes(r)) {
    return { bg: '#ffeb3b', text: '#000000' }; // Yellow
  }
  if (['B3', 'B2', 'A3', 'A2', 'C1'].includes(r)) {
    return { bg: '#0d47a1', text: '#ffffff' }; // Blue
  }
  return { bg: '#cfd8dc', text: '#37474f' }; // Light blue/grey
}

let zones=[];
let threatData={};
let bgImage=null;
let bgBase64=null;
let selectedZone=null;
let activeThreatFilter="all";
let sidebarVisible=true;
let loadSeq=0;

const container=document.getElementById('pe-container');
const initRect=container.getBoundingClientRect();
const stage=new Konva.Stage({container:'pe-container',width:initRect.width,height:initRect.height});
const cameraLayer=new Konva.Layer();
stage.add(cameraLayer);
const cameraGroup=new Konva.Group({x:0,y:0,scaleX:1,scaleY:1});
cameraLayer.add(cameraGroup);
const bgGroup=new Konva.Group();
const zoneGroup=new Konva.Group();
cameraGroup.add(bgGroup);
cameraGroup.add(zoneGroup);

function setStageSizeToContainer(){
  const r=container.getBoundingClientRect();
  stage.width(r.width);stage.height(r.height);
  if(bgBase64){
    const kImg=bgGroup.findOne('Image');
    if(kImg){const img=kImg.image();const s=Math.min(stage.width()/img.width,stage.height()/img.height,1);const w=Math.round(img.width*s),h=Math.round(img.height*s);kImg.setAttrs({x:Math.round((stage.width()-w)/2),y:Math.round((stage.height()-h)/2),width:w,height:h});}
  }
}
function afterLayoutReady(cb){requestAnimationFrame(()=>{requestAnimationFrame(()=>{cb();});});}
window.addEventListener('resize',()=>{setStageSizeToContainer();afterLayoutReady(()=>redrawZones());});

const MIN_SCALE=0.25,MAX_SCALE=5;
function clampScale(s){return Math.max(MIN_SCALE,Math.min(MAX_SCALE,s));}
function zoomToward(ns,px,py){const os=cameraGroup.scaleX();ns=clampScale(ns);const ox=cameraGroup.x(),oy=cameraGroup.y();cameraGroup.scale({x:ns,y:ns});cameraGroup.position({x:px-(px-ox)*(ns/os),y:py-(py-oy)*(ns/os)});cameraLayer.batchDraw();}
stage.on('wheel',e=>{e.evt.preventDefault();const p=stage.getPointerPosition(),d=e.evt.deltaY>0?-1:1;zoomToward(clampScale(cameraGroup.scaleX()*(d>0?1.1:1/1.1)),p.x,p.y);});
document.getElementById('pe-zoom-in').addEventListener('click',()=>{const c=stage.width()/2,d=stage.height()/2;zoomToward(cameraGroup.scaleX()*1.25,c,d);});
document.getElementById('pe-zoom-out').addEventListener('click',()=>{const c=stage.width()/2,d=stage.height()/2;zoomToward(cameraGroup.scaleX()/1.25,c,d);});
document.getElementById('pe-zoom-reset').addEventListener('click',()=>{cameraGroup.scale({x:1,y:1});cameraGroup.position({x:0,y:0});cameraLayer.batchDraw();});

let isPanning=false,panStart={x:0,y:0},panOrigin={x:0,y:0};
stage.on('mousedown touchstart',e=>{
  if(e.target!==stage&&e.target!==bgImage)return;
  isPanning=true;document.getElementById('pe-tooltip').style.display='none';
  const p=stage.getPointerPosition();panStart={x:p.x,y:p.y};panOrigin={x:cameraGroup.x(),y:cameraGroup.y()};
  stage.container().style.cursor='grabbing';
});
stage.on('mousemove touchmove',e=>{if(!isPanning)return;const p=stage.getPointerPosition();cameraGroup.position({x:panOrigin.x+(p.x-panStart.x),y:panOrigin.y+(p.y-panStart.y)});cameraLayer.batchDraw();});
stage.on('mouseup touchend',()=>{if(isPanning){isPanning=false;stage.container().style.cursor='default';}});

function getImageBounds(){const k=bgGroup.findOne('Image');if(k)return{x:k.x(),y:k.y(),width:k.width(),height:k.height()};return{x:0,y:0,width:stage.width(),height:stage.height()};}
function fromRelative(z){
  const b=getImageBounds();
  if(z.rx!=null&&z.ry!=null&&z.rw!=null&&z.rh!=null)return{x:b.x+z.rx*b.width,y:b.y+z.ry*b.height,width:z.rw*b.width,height:z.rh*b.height};
  const rx=(z.x-b.x)/b.width,ry=(z.y-b.y)/b.height;return{x:b.x+rx*b.width,y:b.y+ry*b.height,width:z.width,height:z.height};
}
function round6(v){return +Number(v||0).toFixed(6);}
function pointFromRelative(p){const b=getImageBounds();return{x:b.x+(Number(p[0])||0)*b.width,y:b.y+(Number(p[1])||0)*b.height};}
function polygonCameraPoints(z){return(z.points||[]).map(pointFromRelative);}
function flattenPoints(points){return points.reduce((a,p)=>a.concat([p.x,p.y]),[]);}
function polygonBounds(points){
  if(!points.length)return{x:0,y:0,width:0,height:0};
  const xs=points.map(p=>p.x),ys=points.map(p=>p.y),minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  return{x:minX,y:minY,width:maxX-minX,height:maxY-minY};
}
function normalizePolygonPoints(points){
  if(!Array.isArray(points))return[];
  return points.map(p=>Array.isArray(p)?[Number(p[0]),Number(p[1])]:[Number(p.rx),Number(p.ry)])
    .filter(p=>p.every(v=>isFinite(v))).map(p=>[round6(p[0]),round6(p[1])]);
}
function normalizeZoneRow(z){
  if(!z||!z.unitId)return null;
  const g=z.geometry||{};
  const shape=(z.shape||z.shapeType||g.shape||'rect').toLowerCase();
  if(shape==='polygon')return{unitId:z.unitId,shape:'polygon',points:g.points||z.points||[]};
  return{unitId:z.unitId,shape:'rect',rx:g.rx??z.rx,ry:g.ry??z.ry,rw:g.rw??z.rw,rh:g.rh??z.rh,x:z.x,y:z.y,width:z.width,height:z.height};
}

function calcFontSizes(w,h){
  return{threatSize:Math.max(14,Math.min(42,Math.floor(Math.min(w,h)*0.38))),scoreSize:Math.max(10,Math.min(14,Math.floor(Math.min(w,h)*0.13))),idSize:Math.max(9,Math.min(12,Math.floor(Math.min(w,h)*0.1))),showScore:h>50&&w>50};
}

function restoreZoneVisual(shape,c){shape.stroke(c.stroke);shape.strokeWidth(2);shape.fill(c.fill);}
function drawZone(z,data){
  const isPolygon=z.shape==='polygon';
  const rectBox=isPolygon?null:fromRelative(z);
  const polyPoints=isPolygon?polygonCameraPoints(z):[];
  const bounds=isPolygon?polygonBounds(polyPoints):{x:rectBox.x,y:rectBox.y,width:rectBox.width,height:rectBox.height};
  const group=new Konva.Group({x:isPolygon?0:rectBox.x,y:isPolygon?0:rectBox.y,draggable:false});
  const ramSelect = document.getElementById('pe-ram-select');
  const ramType = ramSelect ? ramSelect.value : 'Overall RAM';
  const ramInfo = data ? getSelectedRamInfo(data, ramType) : { threats: 0, score: 0 };
  const level = data ? getUnitLevel(data, ramType) : 'neutral';
  const c = COLORS[level];
  const shape = isPolygon
    ? new Konva.Line({points:flattenPoints(polyPoints),closed:true,fill:c.fill,stroke:c.stroke,strokeWidth:2,lineJoin:'round'})
    : new Konva.Rect({width:rectBox.width,height:rectBox.height,fill:c.fill,stroke:c.stroke,strokeWidth:2,cornerRadius:4});
  group.add(shape);
  const {threatSize,scoreSize,idSize,showScore} = calcFontSizes(bounds.width,bounds.height);
  group.add(new Konva.Text({text:z.unitId,fontSize:idSize,fill:'rgba(60,60,60,0.7)',fontFamily:'Segoe UI,Arial,sans-serif',fontStyle:'600',x:isPolygon?bounds.x+6:6,y:isPolygon?bounds.y+6:6}));
  if (data && ramInfo.threats > 0) {
    group.add(new Konva.Text({text:String(ramInfo.threats),fontSize:threatSize,fontFamily:'Segoe UI,Arial,sans-serif',fontStyle:'700',fill:'#d50000',stroke:'rgba(0,0,0,0.1)',strokeWidth:0.5,align:'center',verticalAlign:'middle',x:isPolygon?bounds.x:0,y:isPolygon?bounds.y:0,width:bounds.width,height:showScore?bounds.height-scoreSize-8:bounds.height}));
    if (showScore) group.add(new Konva.Text({text:'Score: '+formatMTOScore(ramInfo.score),fontSize:scoreSize,fontFamily:'Segoe UI,Arial,sans-serif',fill:'#333',stroke:'rgba(0,0,0,0.1)',strokeWidth:0.5,align:'center',x:isPolygon?bounds.x:0,width:bounds.width,y:(isPolygon?bounds.y:0)+bounds.height-scoreSize-6}));
  }
  const tip=document.getElementById('pe-tooltip');
  group.on('mouseenter', () => {
    shape.strokeWidth(3);
    cameraLayer.batchDraw();
    stage.container().style.cursor = 'pointer';

    const lv = data ? getUnitLevel(data, ramType) : 'neutral';
    const statusColor =
      lv === 'green'  ? '#3a7a4a' :
      lv === 'yellow' ? '#8a6010' :
      lv === 'red'    ? '#d50000' : '#666';

    let html = '<div class="pe-tooltip-title">' + z.unitId + '</div>';

    if (data) {
      if (ramInfo.threats > 0) {
        html += '<div class="pe-tooltip-row"><span class="pe-tooltip-lbl">Threats</span><span class="pe-tooltip-val">'           + ramInfo.threats   + '</span></div>';
        html += '<div class="pe-tooltip-row"><span class="pe-tooltip-lbl">Score</span><span class="pe-tooltip-val">'             + formatMTOScore(ramInfo.score) + '</span></div>';
        html += '<div class="pe-tooltip-row"><span class="pe-tooltip-lbl">Status</span><span class="pe-tooltip-val" style="color:' + statusColor + '">' + lv.toUpperCase() + '</span></div>';
      } else {
        html += '<div class="pe-tooltip-row"><span class="pe-tooltip-lbl">No active threats</span></div>';
      }
    } else {
      html += '<div class="pe-tooltip-row"><span class="pe-tooltip-lbl">No data</span></div>';
    }

    tip.innerHTML = html;
    tip.style.display = 'block';
  });

  group.on('mousemove',()=>{const p=stage.getPointerPosition(),cr=stage.container().getBoundingClientRect();const tx=cr.left+p.x+14,ty=cr.top+p.y+14;const tw=tip.offsetWidth||160;tip.style.left=(tx+tw>window.innerWidth?tx-tw-28:tx)+'px';tip.style.top=ty+'px';});
  group.on('mouseleave',()=>{if(!selectedZone||selectedZone.unitId!==z.unitId)restoreZoneVisual(shape,c);cameraLayer.batchDraw();stage.container().style.cursor='default';tip.style.display='none';});
  group.on('click tap',()=>{
    if(isPanning)return;
    selectedZone={...z,x:bounds.x,y:bounds.y,w:bounds.width,h:bounds.height,data};
    renderSidebar();shape.strokeWidth(3);cameraLayer.batchDraw();
  });
  zoneGroup.add(group);
}

function redrawZones(){
  if(!stage||!cameraLayer)return;
  zoneGroup.destroyChildren();
  zones.forEach(z=>drawZone(z,threatData[z.unitId]));
  cameraLayer.draw();
}

function applyBgBase64(b64,onReady){
  if(!b64){if(onReady)onReady();return;}
  bgBase64=b64;
  const img=new Image();
  img.onload=()=>{
    bgGroup.destroyChildren();
    const s=Math.min(stage.width()/img.width,stage.height()/img.height,1);
    const w=Math.round(img.width*s),h=Math.round(img.height*s);
    bgImage=new Konva.Image({image:img,x:Math.round((stage.width()-w)/2),y:Math.round((stage.height()-h)/2),width:w,height:h,opacity:0.7});
    bgGroup.add(bgImage);cameraLayer.batchDraw();if(onReady)onReady();
  };
  img.onerror=()=>{if(onReady)onReady();};img.src=b64;
}

function parseZones(zonesRaw){
  const b=getImageBounds();
  return zonesRaw.map(z=>{
    z=normalizeZoneRow(z);
    if(!z||!z.unitId)return null;
    const isPolygon=z.shape==='polygon'||Array.isArray(z.points);
    if(isPolygon){
      const points=normalizePolygonPoints(z.points);
      if(points.length>=3)return{unitId:z.unitId,shape:'polygon',points};
      return null;
    }
    let rx=z.rx,ry=z.ry,rw=z.rw,rh=z.rh;
    if(rx!=null&&ry!=null&&rw!=null&&rh!=null){
      if(z.shape===undefined){
        const sw=stage.width(),sh=stage.height();const ax=rx*sw,ay=ry*sh,aw=rw*sw,ah=rh*sh;
        const outside=(ax<b.x-1||ay<b.y-1||(ax+aw)>(b.x+b.width+1)||(ay+ah)>(b.y+b.height+1));
        if(outside){rx=(ax-b.x)/b.width;ry=(ay-b.y)/b.height;rw=aw/b.width;rh=ah/b.height;}
      }
    }else{rx=(z.x-b.x)/b.width;ry=(z.y-b.y)/b.height;rw=z.width/b.width;rh=z.height/b.height;}
    return{unitId:z.unitId,shape:'rect',rx:round6(rx),ry:round6(ry),rw:round6(rw),rh:round6(rh)};
  }).filter(Boolean);
}

function showToast(msg){console.log('[viewer]',msg);}

function applyThreatRows(rows){
  threatData = {};
  window.applyThreatData(rows, threatData, null, null);
}

function loadLayout(layout){
  if(!layout||!Array.isArray(layout.zones))return;
  // Only extract embedded threat/score data from zones when threatData is empty
  // (i.e. postMessage path). When loaded via API, applyThreatRows() has already
  // populated threatData with proper DB values — don't overwrite with zone-row stubs.
  if(Object.keys(threatData).length===0){
    const embedded=layout.zones
      .filter(z=>z&&z.unitId)
      .map(z=>({unitId:z.unitId,threats:z.threats??null,score:z.score??null}));
    if(embedded.length){window.applyThreatData(embedded, threatData, null, null);}
  }
  const doLoad=()=>{
    zones=parseZones(layout.zones);
    afterLayoutReady(()=>{redrawZones();updateEmptyState();renderSidebar();});
  };
  if(layout.image){
    applyBgBase64(layout.image,doLoad);
  }else{
    showToast('No background image found in layout');
    doLoad();
  }
}

function updateEmptyState(){
  const el=document.getElementById('pe-empty-state');
  if(el)el.style.display=(zones.length===0&&!bgBase64)?'flex':'none';
}

// ── Published plots loader (viewer-only) ──────────────────────────────────
let _basePath = window.location.pathname;
if (_basePath.endsWith('.html')) _basePath = _basePath.substring(0, _basePath.lastIndexOf('/'));
else if (_basePath.endsWith('/')) _basePath = _basePath.substring(0, _basePath.length - 1);
const API = window.API_ROOT || (
  (window.location && window.location.protocol === 'file:')
    ? 'http://localhost:5050'
    : _basePath
);

async function loadPublishedPlot(plotId){
  if(!plotId) return;
  const seq=++loadSeq;
  try{
    const res = await fetch(API + '/plots/' + plotId);
    if(seq!==loadSeq)return;
    if(!res.ok) { showToast('Failed to load plot'); return; }
    const data = await res.json();
    if(seq!==loadSeq)return;
    // Reset state for this plot before applying data
    zones=[];threatData={};bgBase64=null;
    bgGroup.destroyChildren();zoneGroup.destroyChildren();
    try {
      const liveRes = await fetch(API + '/api/threats/live');
      if(seq!==loadSeq)return;
      if (liveRes.ok) {
        const liveMap = await liveRes.json() || {};
        if(seq!==loadSeq)return;
        const liveRows = Object.entries(liveMap).map(([unitId, v]) => ({
          unitId, threats: v.threats, score: v.score, details: v.details
        }));
        applyThreatRows(liveRows);
        Object.entries(liveMap).forEach(([unitId, v]) => {
          if (threatData[unitId]) threatData[unitId].details = v.details || [];
        });
      } else {
        console.warn('Live threat fetch returned', liveRes.status, '- falling back to DB threats');
        if(seq!==loadSeq)return;
        applyThreatRows(data.threats || []);
      }
    } catch (err) {
      console.warn('Live threat fetch failed:', err);
      if(seq!==loadSeq)return;
      applyThreatRows(data.threats || []);
    }
    if(data.imageUrl){
      try{
        const r = await fetch((data.imageUrl||'').startsWith('/') ? API + data.imageUrl : data.imageUrl);
        if(seq!==loadSeq)return;
        const blob = await r.blob();
        if(seq!==loadSeq)return;
        const rd = new FileReader();
        rd.onload = ev => { if(seq!==loadSeq)return; loadLayout({ image: ev.target.result, zones: data.zones || [] }); };
        rd.readAsDataURL(blob);
      }catch(e){ if(seq!==loadSeq)return; zones = parseZones(data.zones || []); afterLayoutReady(()=>{if(seq!==loadSeq)return;redrawZones();updateEmptyState();}); }
    }else{
      if(seq!==loadSeq)return;
      loadLayout({ image: null, zones: data.zones || [] });
    }
  }catch(err){ console.warn('loadPublishedPlot error', err); showToast('Load failed'); }
}

async function fetchPublishedPlots(){
  const sel = document.getElementById('pe-plot-select');
  if(!sel) return;
  try{
    const res = await fetch(API + '/plots/published');
    if(!res.ok){ sel.innerHTML = '<option disabled selected>No published plots</option>'; sel.disabled = true; return; }
    const list = await res.json();
    sel.innerHTML = '';
    if(!list || list.length === 0){ sel.innerHTML = '<option disabled selected>No published plots</option>'; sel.disabled = true; return; }
    list.forEach((p, idx) => {
      const opt = document.createElement('option');
      opt.value = p.plotId;
      opt.text = p.plotName + (p.publishedAt ? ' (' + p.publishedAt + ')' : '');
      sel.appendChild(opt);
    });
    if(list.length === 1){ sel.disabled = true; loadPublishedPlot(list[0].plotId); }
    else { sel.disabled = false; sel.addEventListener('change', ()=> loadPublishedPlot(sel.value)); loadPublishedPlot(sel.value); }
  }catch(err){ console.warn('fetchPublishedPlots error', err); sel.innerHTML = '<option disabled selected>Error loading plots</option>'; sel.disabled = true; }
}

// Kick off published list load on viewer startup
document.addEventListener('DOMContentLoaded', ()=>{
  setTimeout(fetchPublishedPlots, 10);
  const ramSelect = document.getElementById('pe-ram-select');
  if (ramSelect) {
    ramSelect.addEventListener('change', () => {
      redrawZones();
      if (selectedZone) {
        selectedZone.data = threatData[selectedZone.unitId] || null;
        renderSidebar();
      }
    });
  }
});

const IS_EMBEDDED=(window.self!==window.top);
window.addEventListener('message',e=>{
  const msg=e.data;if(!msg||typeof msg!=='object')return;
  if(msg.type==='PLOT_PLAN_LOAD'){
    const l=msg.payload;if(!l)return;
    if(l.imageUrl){fetch(l.imageUrl).then(r=>r.blob()).then(blob=>{const rd=new FileReader();rd.onload=ev=>{applyBgBase64(ev.target.result,()=>{if(l.zones){zones=parseZones(l.zones);afterLayoutReady(()=>redrawZones());}});};rd.readAsDataURL(blob);}).catch(()=>{if(l.zones){zones=parseZones(l.zones);afterLayoutReady(()=>redrawZones());}});}
    else if(l.image)loadLayout(l);
    else if(l.zones){zones=parseZones(l.zones);afterLayoutReady(()=>redrawZones());}
  }else if(msg.type==='PLOT_PLAN_UPDATE_DATA'){window.updateData(msg.payload);}
});

window.updateData = function(dataArray){
  window.applyThreatData(dataArray, threatData, redrawZones, typeof updateEmptyState === 'function' ? updateEmptyState : null);
  renderSidebar();
};


const sidebar=document.getElementById('pe-sidebar');
const toggleSidebarBtn=document.getElementById('pe-toggle-sidebar');
const innerToggle=document.getElementById('pe-sidebar-toggle-inner');
function setSidebarVisible(v){
  sidebarVisible=v;
  if(v){sidebar.classList.remove('pe-collapsed');toggleSidebarBtn.textContent='\u25C0 Panel';innerToggle.textContent='\u25B6';}
  else{sidebar.classList.add('pe-collapsed');toggleSidebarBtn.textContent='\u25B6 Panel';innerToggle.textContent='\u25C0';}
  // Resize canvas after CSS width transition completes (class toggle only; no redraw here)
  setTimeout(()=>{ setStageSizeToContainer(); }, 260);
}
toggleSidebarBtn.addEventListener('click',()=>setSidebarVisible(!sidebarVisible));
innerToggle.addEventListener('click',()=>setSidebarVisible(!sidebarVisible));

// Drag-resize handle — wires to the left edge of the sidebar
(function(){
  const handle=document.createElement('div');
  handle.className='pe-sidebar-resize-handle';
  sidebar.insertBefore(handle,sidebar.firstChild);
  let dragging=false,startX=0,startW=0;
  handle.addEventListener('mousedown',e=>{
    if(!sidebarVisible)return;
    dragging=true;startX=e.clientX;startW=sidebar.offsetWidth;
    document.body.style.cursor='col-resize';document.body.style.userSelect='none';
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const delta=startX-e.clientX; // dragging left = growing sidebar
    const newW=Math.max(220,Math.min(700,startW+delta));
    sidebar.style.width=newW+'px';sidebar.style.minWidth=newW+'px';
    setStageSizeToContainer();
  });
  document.addEventListener('mouseup',()=>{
    if(!dragging)return;
    dragging=false;document.body.style.cursor='';document.body.style.userSelect='';
    afterLayoutReady(()=>redrawZones());
  });
})();

// Global helper so collapsible rows can trigger update
window.toggleSidebarSection = function(key) {
  window.sidebarCollapsedStates = window.sidebarCollapsedStates || {};
  window.sidebarCollapsedStates[key] = !window.sidebarCollapsedStates[key];
  renderSidebar();
};

function renderSidebar() {
  if (!sidebarVisible) setSidebarVisible(true);

  const ramSelect = document.getElementById('pe-ram-select');
  const ramType = ramSelect ? ramSelect.value : 'Overall RAM';
  const sidebarContent = document.getElementById('pe-sidebar-content');
  const sidebarHeaderTitle = document.querySelector('.pe-sidebar-title');

  let htmlContent = '';
  if (selectedZone) {
    const unitId = selectedZone.unitId;
    const unitData = threatData[unitId] || { details: [] };
    if (sidebarHeaderTitle) {
      sidebarHeaderTitle.textContent = `Unit ${unitId}`;
    }
    htmlContent = window.ThreatMapSidebar.renderZoneThreatPanel(unitId, unitData, activeThreatFilter, { ramType });
  } else {
    if (sidebarHeaderTitle) {
      sidebarHeaderTitle.textContent = `Overall Summary`;
    }
    htmlContent = window.ThreatMapSidebar.renderOverallThreatPanel(threatData, activeThreatFilter, { ramType });
  }

  let backBtnHtml = '';
  if (selectedZone) {
    backBtnHtml = `
      <div style="padding: 8px 10px; border-bottom: 1px solid #ddd; background: #fff; display: flex; gap: 8px; align-items: center;">
        <button type="button" id="pe-back-overall" style="border: 1px solid #ccd4dc; background: #f8f9fa; color: #333; border-radius: 3px; padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px;">
          <i data-lucide="arrow-left" style="width:12px;height:12px;"></i> Back to Overall
        </button>
      </div>`;
  } else {
    backBtnHtml = `
      <div style="padding: 8px 10px; border-bottom: 1px solid #ddd; background: #fff; display: flex; justify-content: flex-end; align-items: center;">
        <button type="button" id="pe-refresh-sidebar" style="border: 1px solid #ccd4dc; background: #f8f9fa; color: #333; border-radius: 3px; padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px;">
          <i data-lucide="rotate-cw" style="width:12px;height:12px;"></i> Refresh
        </button>
      </div>`;
  }

  sidebarContent.innerHTML = backBtnHtml + htmlContent;

  const filterBtns = sidebarContent.querySelectorAll('[data-threat-filter]');
  filterBtns.forEach(btn => {
    btn.addEventListener('click', (e) => {
      activeThreatFilter = btn.getAttribute('data-threat-filter');
      renderSidebar();
    });
  });

  const backBtn = document.getElementById('pe-back-overall');
  if (backBtn) {
    backBtn.addEventListener('click', () => {
      selectedZone = null;
      redrawZones();
      renderSidebar();
    });
  }

  const refreshBtn = document.getElementById('pe-refresh-sidebar');
  if (refreshBtn) {
    refreshBtn.addEventListener('click', async () => {
      const plotSelect = document.getElementById('pe-plot-select');
      if (plotSelect && plotSelect.value) {
        await loadPublishedPlot(plotSelect.value);
      }
    });
  }

  if (typeof lucide !== 'undefined' && lucide.createIcons) {
    lucide.createIcons();
  }
}

/* DEPRECATED ROLLBACK BLOCK */ function openSidebar(){
  if (!selectedZone) return;
  if (!sidebarVisible) setSidebarVisible(true);

  const z = selectedZone, d = z.data;
  const ramSelect = document.getElementById('pe-ram-select');
  const ramType = ramSelect ? ramSelect.value : 'Overall RAM';
  const level = d ? getUnitLevel(d, ramType) : 'neutral';
  const c = COLORS[level];

  let contentHtml = '';

  if (d && Array.isArray(d.details) && d.details.length > 0) {
    const unitIdNorm = z.unitId.trim().toUpperCase();
    const unitLevelThreats = [];
    const eqsGroups = {}; 

    d.details.forEach(item => {
      const tag = (item.tag || item.Tag || '').trim();
      const eqs = (item.eqs || item.EQS || '').trim();
      const isUnitLevel = !tag || tag.toUpperCase() === unitIdNorm;

      if (isUnitLevel) {
        unitLevelThreats.push(item);
      } else {
        const groupName = eqs ? eqs : `${tag}-EQS`;
        if (!eqsGroups[groupName]) {
          eqsGroups[groupName] = [];
        }
        eqsGroups[groupName].push(item);
      }
    });

    const formatScoreVal = (item) => {
      if (ramType === 'HSSC RAM') return item.hsscScore || item.HSSCScore || item.mtoScore || item.MTOScore || '0';
      if (ramType === 'Production RAM') return item.productionScore || item.ProductionScore || item.mtoScore || item.MTOScore || '0';
      return item.mtoScore || item.MTOScore || '0';
    };

    const getRamCode = (item) => {
      if (ramType === 'HSSC RAM') return item.hsscRAM || item.HSSCRAM || item.primaryRAM || item.PrimaryRAM || 'E0';
      if (ramType === 'Production RAM') return item.productionRAM || item.ProductionRAM || item.primaryRAM || item.PrimaryRAM || 'E0';
      return item.primaryRAM || item.PrimaryRAM || 'E0';
    };

    const getSectionStats = (threatList) => {
      let sttCount = 0;
      let lttCount = 0;
      let scoreSum = 0;
      threatList.forEach(t => {
        const type = (t.threatType || t.ThreatType || '').toUpperCase().trim();
        if (type === 'LTT') lttCount++;
        else sttCount++;
        scoreSum += parseMTOScoreString(formatScoreVal(t));
      });
      return { sttCount, lttCount, scoreSum };
    };

    let sectionRows = '';
    window.sidebarCollapsedStates = window.sidebarCollapsedStates || {};

    const renderSection = (sectionName, sectionKey, threatList) => {
      const stats = getSectionStats(threatList);
      const collapsed = window.sidebarCollapsedStates[sectionKey] === true;

      let html = `
        <tr style="background:#e3f2fd; border-bottom:2px solid #90caf9; font-weight:bold; cursor:pointer;" onclick="window.toggleSidebarSection('${sectionKey}')">
          <td colspan="2" style="padding:8px 10px; border:1px solid #ddd; color:#1565c0; text-align:left;">
            <span style="display:inline-block; width:12px; margin-right:4px; text-align:center; font-family:monospace;">${collapsed ? '+' : '−'}</span>
            ${sectionName}
          </td>
          <td style="padding:8px 10px; border:1px solid #ddd; text-align:center; color:#555; font-weight:normal;">
            ${stats.sttCount} STT / ${stats.lttCount} LTT
          </td>
          <td style="padding:8px 10px; border:1px solid #ddd; text-align:right; color:#1565c0; font-weight:bold;">
            ${formatMTOScore(stats.scoreSum)}
          </td>
          <td colspan="4" style="border:1px solid #ddd; background:#e3f2fd;"></td>
        </tr>`;

      if (!collapsed) {
        const stts = threatList.filter(t => (t.threatType || t.ThreatType || '').toUpperCase().trim() !== 'LTT');
        const ltts = threatList.filter(t => (t.threatType || t.ThreatType || '').toUpperCase().trim() === 'LTT');

        const renderSubSection = (subName, subKey, list) => {
          if (list.length === 0) return '';
          const subStats = getSectionStats(list);
          const subCollapsed = window.sidebarCollapsedStates[subKey] === true;

          let subHtml = `
            <tr style="background:#f1f8e9; font-weight:bold; cursor:pointer;" onclick="window.toggleSidebarSection('${subKey}')">
              <td colspan="2" style="padding:6px 10px; border:1px solid #ddd; color:#33691e; padding-left:24px; text-align:left;">
                <span style="display:inline-block; width:12px; margin-right:4px; text-align:center; font-family:monospace;">${subCollapsed ? '+' : '−'}</span>
                ${list.length} ${subName}
              </td>
              <td style="padding:6px 10px; border:1px solid #ddd; text-align:center; color:#33691e; font-weight:normal;">
                ${list.length} Active
              </td>
              <td style="padding:6px 10px; border:1px solid #ddd; text-align:right; color:#33691e;">
                ${formatMTOScore(subStats.scoreSum)}
              </td>
              <td colspan="4" style="border:1px solid #ddd; background:#f1f8e9;"></td>
            </tr>`;

          if (!subCollapsed) {
            list.forEach(item => {
              const ram = getRamCode(item);
              const ramStyle = getRamStyle(ram);
              const threatUrl = (item.threatURL || item.ThreatURL || '').trim();
              const idCell = threatUrl
                ? `<a href="${threatUrl}" target="_blank" style="color:#0288d1; text-decoration:underline; font-weight:bold;">${item.threatID || item.ThreatID}</a>`
                : (item.threatID || item.ThreatID);

              const tagVal = (item.tag || item.Tag || '').trim();
              const tagCell = tagVal
                ? `<a href="https://inhydvmimi1:4433/DataRetrieve/AssetDetails.aspx?tag=${encodeURIComponent(tagVal)}" target="_blank" style="color:#0288d1; text-decoration:underline;">${tagVal}</a>`
                : 'Unit Level';

              subHtml += `
                <tr style="background:#ffffff; border-bottom:1px solid #eee;">
                  <td style="padding:6px 8px; border:1px solid #ddd;">${idCell}</td>
                  <td style="padding:6px 8px; border:1px solid #ddd;">${tagCell}</td>
                  <td style="padding:6px 8px; border:1px solid #ddd; font-size:10.5px; line-height:1.3; max-width:240px; word-wrap:break-word; white-space:normal;">
                    ${item.initiativeName || item.InitiativeName || ''}
                  </td>
                  <td style="padding:6px 8px; border:1px solid #ddd; text-align:right; font-weight:600;">
                    ${formatMTOScore(parseMTOScoreString(formatScoreVal(item)))}
                  </td>
                  <td style="padding:6px 8px; border:1px solid #ddd; text-align:center; font-weight:bold; background:${ramStyle.bg}; color:${ramStyle.text}; text-shadow: ${ramStyle.text==='#ffffff'?'1px 1px 1px rgba(0,0,0,0.5)':'none'};">
                    ${ram}
                  </td>
                  <td style="padding:6px 8px; border:1px solid #ddd; text-align:center;">
                    ${item.overallStatus || item.OverallStatus || ''}
                  </td>
                  <td style="padding:6px 8px; border:1px solid #ddd; text-align:center; color:#555;">
                    ${(item.threatDiscipline || item.ThreatDiscipline || '').split(':')[0]}
                  </td>
                  <td style="padding:6px 8px; border:1px solid #ddd; text-align:center; color:#666;">
                    ${item.createdDate || item.CreatedDate || ''}
                  </td>
                </tr>`;
            });
          }
          return subHtml;
        };

        html += renderSubSection('STT', `${sectionKey}-STT`, stts);
        html += renderSubSection('LTT', `${sectionKey}-LTT`, ltts);
      }
      return html;
    };

    if (unitLevelThreats.length > 0) {
      sectionRows += renderSection('Unit level threats', `${z.unitId}-unit`, unitLevelThreats);
    }

    const sortedEqsKeys = Object.keys(eqsGroups).map(key => {
      const stats = getSectionStats(eqsGroups[key]);
      return { key, score: stats.scoreSum };
    }).sort((a, b) => b.score - a.score);

    sortedEqsKeys.forEach(item => {
      sectionRows += renderSection(item.key, `${z.unitId}-${item.key}`, eqsGroups[item.key]);
    });

    contentHtml = `
      <table class="pe-aim-table" style="width:100%; border-collapse:collapse; font-size:11px; text-align:left; font-family:'Segoe UI',Arial,sans-serif;">
        <thead>
          <tr style="background:#0b4d6b; color:#ffffff; font-weight:600; text-transform:uppercase; font-size:10px; letter-spacing:0.5px;">
            <th style="padding:8px 10px; border:1px solid #ddd; width:80px;">ID</th>
            <th style="padding:8px 10px; border:1px solid #ddd; width:95px;">Tag</th>
            <th style="padding:8px 10px; border:1px solid #ddd; width:220px;">Initiative name</th>
            <th style="padding:8px 10px; border:1px solid #ddd; width:100px; text-align:right;">MTO score</th>
            <th style="padding:8px 10px; border:1px solid #ddd; width:80px; text-align:center;">RAM</th>
            <th style="padding:8px 10px; border:1px solid #ddd; width:95px; text-align:center;">Status</th>
            <th style="padding:8px 10px; border:1px solid #ddd; width:80px; text-align:center;">Discipline</th>
            <th style="padding:8px 10px; border:1px solid #ddd; width:80px; text-align:center;">Created Date</th>
          </tr>
        </thead>
        <tbody>
          ${sectionRows}
        </tbody>
      </table>`;
  } else {
    contentHtml = '<div style="color:#888;font-size:12px;text-align:center;padding-top:40px;">No threats reported for this unit</div>';
  }

  const sidebarHeader = document.querySelector('.pe-sidebar-title');
  if (sidebarHeader) {
    sidebarHeader.textContent = `Unit ${z.unitId}`;
  }

  document.getElementById('pe-sidebar-content').innerHTML = `
    <div style="padding:10px; border-bottom:1px solid #ddd; background:#f5f6f7; display:flex; justify-content:space-between; align-items:center;">
      <span style="font-weight:bold; font-size:13px; color:#333;">Threat List (Filter: ${ramType})</span>
      <span style="font-size:11px; background:#e8edf2; border:1px solid #ccd4dc; padding:2px 8px; border-radius:3px; color:#555; font-weight:600;">
        Unit ID: ${z.unitId}
      </span>
    </div>
    <div style="padding:8px; overflow-x:auto;">
      ${contentHtml}
    </div>`;
}

  selectedZone=null;
  setSidebarVisible(false);
  redrawZones();
  renderSidebar();
});

if(IS_EMBEDDED){window.parent.postMessage({type:'PLOT_PLAN_READY'},'*');}
updateEmptyState();
lucide.createIcons();

})();
